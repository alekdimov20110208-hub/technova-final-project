<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="650" rx="40" fill="url(#grad)"/>
  <circle cx="820" cy="130" r="110" fill="rgba(255,255,255,0.16)"/>
  <circle cx="160" cy="520" r="145" fill="rgba(255,255,255,0.12)"/>
  <rect x="90" y="95" width="820" height="460" rx="32" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <g transform="translate(500, 200) scale(1.6)" stroke="white" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Monitor Screen -->
    <rect x="-30" y="-30" width="60" height="42" rx="4" stroke="white" stroke-width="3" fill="rgba(255,255,255,0.1)"/>
    <!-- Laptop Base -->
    <path d="M -42 12 L 42 12 L 48 20 L -48 20 Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="3"/>
    <!-- Trackpad -->
    <line x1="-8" y1="16" x2="8" y2="16" stroke="white" stroke-width="2"/>
    <!-- Screen Accent/Code -->
    <path d="M -15 -18 L -5 -18 M -15 -10 L 10 -10 M -15 -2 L -8 -2" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  </g>
  <text x="500" y="330" font-family="Arial, sans-serif" font-size="54" font-weight="700" text-anchor="middle" fill="white">TechNova Studio</text>
  <text x="500" y="390" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="white">модерни уеб решения</text>
  <line x1="310" y1="440" x2="690" y2="440" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
</svg>